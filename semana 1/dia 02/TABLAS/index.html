<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLAS</title>
</head>
<body>
    <h2>TABLA BASICA</h2>
    <table border="color">
        <thead>
        <tr>
            <th>#fila 1, celda 1</th>
            <th>#fila 1, celda 2</th>
            <th>#fila 1, celda 3</th>
        </tr>
        </thead>

        <tbody>
        <tr>
            <th>#fila 2, celda 1</th>
            <th>#fila 2, celda 2</th>
            <th>#fila 2, celda 3</th>
        </tr> 
        </tbody>
        <tfoot>
        <tr>
            <th>#fila 3, celda 1</th>
            <th>#fila 3, celda 2</th>
            <th>#fila 3 celda 3</th>
        </tr>
        </tfoot>
    </table>

</body>
</html>
